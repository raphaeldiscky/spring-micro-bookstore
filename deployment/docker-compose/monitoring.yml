name: 'spring-micro-bookstore'

services:
  prometheus:
    image: prom/prometheus:v3.3.1
    container_name: prometheus
    command: "--config.file=/etc/prometheus/docker-config.yml"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus-config.yml:/etc/prometheus/docker-config.yml

  promtail:
    image: grafana/promtail:3.5.0
    container_name: promtail
    command: "--config.file=/etc/promtail/docker-config.yml"
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/docker-config.yml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock

  loki:
    image: grafana/loki:3.5.0
    container_name: loki
    command: "--config.file=/etc/loki/local-config.yaml"
    ports:
      - "3100:3100"
    depends_on:
      - promtail

  tempo:
    image: grafana/tempo:2.7.2
    container_name: tempo
    command: "--config.file=/etc/tempo/docker-config.yml"
    ports:
      - "3200:3200"     # Tempo
      - "9411:9411"     # Zipkin
    volumes:
      - ./tempo/tempo-config.yml:/etc/tempo/docker-config.yml

  grafana:
    image: grafana/grafana:11.6.1
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false

volumes:
  grafana_data: { }